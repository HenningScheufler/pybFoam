name: Compiler Support

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches:
      - '*'

jobs:
  build-test:
    if: github.event_name == 'workflow_dispatch' || vars.COMPILER_SUPPORT == 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler:
          - { name: gcc-9,    cc: gcc-9,    cxx: g++-9,    apt: "gcc-9 g++-9" }
          - { name: gcc-10,   cc: gcc-10,   cxx: g++-10,   apt: "gcc-10 g++-10" }
          - { name: gcc-11,   cc: gcc-11,   cxx: g++-11,   apt: "gcc-11 g++-11" }
          - { name: gcc-13,   cc: gcc-13,   cxx: g++-13,   apt: "gcc-13 g++-13" }
          - { name: gcc-14,   cc: gcc-14,   cxx: g++-14,   apt: "gcc-14 g++-14" }
          - { name: clang-16, cc: clang-16, cxx: clang++-16, apt: "clang-16" }
          - { name: clang-17, cc: clang-17, cxx: clang++-17, apt: "clang-17" }
          - { name: clang-18, cc: clang-18, cxx: clang++-18, apt: "clang-18" }
      fail-fast: false
    name: Test with ${{ matrix.compiler.name }} (OpenFOAM 2506, Python 3.11)
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v5

      - name: Install compiler (${{ matrix.compiler.name }})
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler.apt }}
          ${{ matrix.compiler.cc }} --version
          ${{ matrix.compiler.cxx }} --version

      - name: Set up OpenFOAM
        uses: gerlero/setup-openfoam@v1
        with:
          openfoam-version: 2506

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Build package
        run: |
          pip install .[dev]

      - name: Run tests
        run: |
          pytest
