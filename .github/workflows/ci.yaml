name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches:
      - '*'

jobs:
  build-test:
    runs-on: ubuntu-24.04 # may use an older version to test
    strategy:
      matrix:
        openfoam-version: [2312, 2406, 2412, 2506, 2512]
      fail-fast: false
    name: Test with OpenFOAM ${{ matrix.openfoam-version }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up OpenFOAM
        uses: gerlero/setup-openfoam@v1
        with:
          openfoam-version: ${{ matrix.openfoam-version }}
      - name: Install Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Build package
        run: |
          pip install .[dev]

      - name: Run tests
        run: |
          pytest

  pre-commit-checks:
    name: Pre-commit checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up OpenFOAM
        uses: gerlero/setup-openfoam@v1
        with:
          openfoam-version: 2506

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run pre-commit on all files
        run: |
          pre-commit run --all-files --color always --verbose

  verify-embed-install:
    name: Verify pybFoamEmbed install layout
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up OpenFOAM
        uses: gerlero/setup-openfoam@v1
        with:
          openfoam-version: 2506

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pybFoam (non-editable, so embed/ is staged in site-packages)
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Assert embed install layout
        run: |
          set -e
          SITE=$(python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          echo "Checking layout under $SITE/pybFoam/embed"
          test -f "$SITE/pybFoam/embed/lib/libpybFoamEmbed.so"
          test -f "$SITE/pybFoam/embed/lib/libnanobind.so"
          test -f "$SITE/pybFoam/embed/cmake/pybFoamEmbed/pybFoamEmbedConfig.cmake"
          test -f "$SITE/pybFoam/embed/cmake/pybFoamEmbed/pybFoamEmbedTargets.cmake"
          test -f "$SITE/pybFoam/embed/include/pybFoamEmbed/pyInterp.hpp"
          test -f "$SITE/pybFoam/embed/include/pybFoamEmbed/nanobind/include/nanobind/nanobind.h"

      - name: Configure and build consumer smoke test
        run: |
          cd tests/embed_consumer
          cmake -B build
          cmake --build build
